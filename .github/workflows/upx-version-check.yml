name: UPX version check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve current and latest UPX versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          current="$(grep -oP '^ARG UPX_VERSION=\K\S+' Dockerfile)"
          latest="$(gh api repos/upx/upx/releases/latest --jq '.tag_name' | sed 's/^v//')"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$latest" ]; then
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump UPX version in Dockerfile
        if: steps.versions.outputs.update_needed == 'true'
        env:
          LATEST_VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail
          sed -i "s|^ARG UPX_VERSION=.*|ARG UPX_VERSION=${LATEST_VERSION}|" Dockerfile

      - name: Open or update PR
        if: steps.versions.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: upx-update-${{ steps.versions.outputs.latest }}
          delete-branch: true
          commit-message: "[docker]: bump upx from ${{ steps.versions.outputs.current }} to ${{ steps.versions.outputs.latest }}"
          title: "[docker]: bump upx from ${{ steps.versions.outputs.current }} to ${{ steps.versions.outputs.latest }}"
          body: |
            Bumps [upx/upx](https://github.com/upx/upx) from `${{ steps.versions.outputs.current }}` to `${{ steps.versions.outputs.latest }}`.

            Release notes: https://github.com/upx/upx/releases/tag/v${{ steps.versions.outputs.latest }}

            Generated by `.github/workflows/upx-version-check.yml`.
          labels: dependencies