name: Build and push Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.1.3

permissions:
  contents: read

jobs:
  check-branch:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    outputs:
      on-default-branch: ${{ steps.check.outputs.on-default-branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history to check branch
          persist-credentials: false

      - name: Check if tag is on main branch
        id: check
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Check if the tag exists on the main branch
          if git branch -r --contains "$TAG_NAME" | grep -q "origin/main"; then
            echo "Tag $TAG_NAME is on main branch"
            echo "on-default-branch=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG_NAME is NOT on main branch"
            echo "on-default-branch=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  build-amd64:
    needs: [ check-branch ]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (needs.check-branch.result == 'success' && needs.check-branch.outputs.on-default-branch == 'true'))
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-arch.yml
    with:
      arch: amd64
      runner: ubuntu-latest
      platform: linux/amd64
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-arm64:
    needs: [ check-branch ]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (needs.check-branch.result == 'success' && needs.check-branch.outputs.on-default-branch == 'true'))
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-arch.yml
    with:
      arch: arm64
      runner: ubuntu-24.04-arm
      platform: linux/arm64
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  create-manifests:
    runs-on: ubuntu-latest
    needs: [ check-branch, build-amd64, build-arm64 ]
    permissions:
      contents: read
      packages: write
      id-token: write
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (needs.check-branch.result == 'success' && needs.check-branch.outputs.on-default-branch == 'true')) &&
      needs.build-amd64.result == 'success' &&
      needs.build-arm64.result == 'success'
    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            docker.io/safebucket/safebucket
            ghcr.io/safebucket/safebucket
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=main,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail

          echo "Metadata: $METADATA"

          dockerhub_tags=$(echo "$METADATA" | jq -r '.tags[] | select(startswith("docker.io/"))')
          ghcr_tags=$(echo "$METADATA" | jq -r '.tags[] | select(startswith("ghcr.io/"))')

          if [[ -n "$dockerhub_tags" ]]; then
            echo "Creating Docker Hub manifest for: $dockerhub_tags"
            tag_args=""
            for tag in $dockerhub_tags; do
              tag_args="$tag_args --tag $tag"
            done
            docker buildx imagetools create \
              $tag_args \
              docker.io/safebucket/safebucket@${{ needs.build-amd64.outputs.digest-dockerhub }} \
              docker.io/safebucket/safebucket@${{ needs.build-arm64.outputs.digest-dockerhub }}
          fi

          if [[ -n "$ghcr_tags" ]]; then
            echo "Creating GHCR manifest for: $ghcr_tags"
            tag_args=""
            for tag in $ghcr_tags; do
              tag_args="$tag_args --tag $tag"
            done
            docker buildx imagetools create \
              $tag_args \
              ghcr.io/safebucket/safebucket@${{ needs.build-amd64.outputs.digest-github }} \
              ghcr.io/safebucket/safebucket@${{ needs.build-arm64.outputs.digest-github }}
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the images
        env:
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          TAGS=$(echo "$METADATA" | jq -r '.tags[]')
          for tag in $TAGS; do
            DIGEST=$(docker buildx imagetools inspect "$tag" --format '{{json .Manifest}}' | jq -r '.digest')
            REPO=$(echo "$tag" | cut -d: -f1)
            echo "Signing $REPO@$DIGEST"
            cosign sign --yes "$REPO@$DIGEST"
          done

  release:
    needs: [check-branch, build-amd64, build-arm64, create-manifests]
    if: >
      github.ref_type == 'tag' &&
      needs.create-manifests.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: binary-linux-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum safebucket-linux-* > checksums.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries
        working-directory: dist
        run: |
          for bin in safebucket-linux-*; do
            cosign sign-blob --yes --output-signature "${bin}.sig" --output-certificate "${bin}.pem" "${bin}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/safebucket-linux-amd64
            dist/safebucket-linux-amd64.sig
            dist/safebucket-linux-amd64.pem
            dist/safebucket-linux-arm64
            dist/safebucket-linux-arm64.sig
            dist/safebucket-linux-arm64.pem
            dist/checksums.txt
