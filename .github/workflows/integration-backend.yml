name: Backend integration tests

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/quality-backend.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/quality-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [postgres, sqlite]
    name: "test (${{ matrix.scenario }})"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
          cache: true

      - name: Create web dist placeholder
        run: mkdir -p web/dist && touch web/dist/index.html

      - name: Run Go integration tests
        env:
          TEST_SCENARIO: ${{ matrix.scenario }}
        run: go test -v -tags=integration -timeout=15m ./internal/tests/integration/...
