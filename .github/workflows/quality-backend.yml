name: Backend quality

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/quality-backend.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/quality-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
          cache: true

      - name: Create web dist placeholder
        run: mkdir -p web/dist && touch web/dist/index.html

      - name: Run Go linter
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          args: --timeout=5m
          working-directory: ${{ github.workspace }}

      - name: Run Go unit tests
        run: go test -v ./...
