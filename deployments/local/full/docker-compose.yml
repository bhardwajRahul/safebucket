name: safebucket

services:
  safebucket:
    container_name: safebucket
    image: ghcr.io/safebucket/safebucket:latest
    environment:
      - APP__LOG_LEVEL=${APP__LOG_LEVEL}
      - APP__PROFILE=${APP__PROFILE}
      - APP__API_URL=${APP__API_URL}
      - APP__WEB_URL=${APP__WEB_URL}
      - APP__PORT=${APP__PORT}
      - APP__TRUSTED_PROXIES=${APP__TRUSTED_PROXIES}
      - APP__STATIC_FILES__ENABLED=${APP__STATIC_FILES__ENABLED}
      - APP__JWT_SECRET=${APP__JWT_SECRET}
      - APP__ADMIN_EMAIL=${APP__ADMIN_EMAIL}
      - APP__ADMIN_PASSWORD=${APP__ADMIN_PASSWORD}
      - APP__ALLOWED_ORIGINS=${APP__ALLOWED_ORIGINS}
      - APP__TRASH_RETENTION_DAYS=${APP__TRASH_RETENTION_DAYS}
      - APP__MFA_ENCRYPTION_KEY=${APP__MFA_ENCRYPTION_KEY}
      - APP__MFA_REQUIRED=${APP__MFA_REQUIRED}
      - APP__MAX_UPLOAD_SIZE=${APP__MAX_UPLOAD_SIZE}
      - DATABASE__TYPE=${DATABASE__TYPE}
      - DATABASE__POSTGRES__HOST=${DATABASE__POSTGRES__HOST}
      - DATABASE__POSTGRES__PORT=${DATABASE__POSTGRES__PORT}
      - DATABASE__POSTGRES__USER=${DATABASE__POSTGRES__USER}
      - DATABASE__POSTGRES__PASSWORD=${DATABASE__POSTGRES__PASSWORD}
      - DATABASE__POSTGRES__NAME=${DATABASE__POSTGRES__NAME}
      - DATABASE__POSTGRES__SSLMODE=${DATABASE__POSTGRES__SSLMODE}
      - DATABASE__HOST=${DATABASE__POSTGRES__HOST}
      - DATABASE__PORT=${DATABASE__POSTGRES__PORT}
      - DATABASE__USER=${DATABASE__POSTGRES__USER}
      - DATABASE__PASSWORD=${DATABASE__POSTGRES__PASSWORD}
      - DATABASE__NAME=${DATABASE__POSTGRES__NAME}
      - DATABASE__SSLMODE=${DATABASE__POSTGRES__SSLMODE}
      - CACHE__TYPE=${CACHE__TYPE}
      - CACHE__VALKEY__HOSTS=${CACHE__VALKEY__HOSTS}
      - CACHE__VALKEY__PASSWORD=${CACHE__VALKEY__PASSWORD}
      - STORAGE__TYPE=${STORAGE__TYPE}
      - STORAGE__RUSTFS__BUCKET_NAME=${STORAGE__RUSTFS__BUCKET_NAME}
      - STORAGE__RUSTFS__ENDPOINT=${STORAGE__RUSTFS__ENDPOINT}
      - STORAGE__RUSTFS__EXTERNAL_ENDPOINT=${STORAGE__RUSTFS__EXTERNAL_ENDPOINT}
      - STORAGE__RUSTFS__ACCESS_KEY=${STORAGE__RUSTFS__ACCESS_KEY}
      - STORAGE__RUSTFS__SECRET_KEY=${STORAGE__RUSTFS__SECRET_KEY}
      - EVENTS__TYPE=${EVENTS__TYPE}
      - EVENTS__QUEUES__NOTIFICATIONS__NAME=${EVENTS__QUEUES__NOTIFICATIONS__NAME}
      - EVENTS__QUEUES__BUCKET_EVENTS__NAME=${EVENTS__QUEUES__BUCKET_EVENTS__NAME}
      - EVENTS__QUEUES__OBJECT_DELETION__NAME=${EVENTS__QUEUES__OBJECT_DELETION__NAME}
      - EVENTS__JETSTREAM__HOST=${EVENTS__JETSTREAM__HOST}
      - EVENTS__JETSTREAM__PORT=${EVENTS__JETSTREAM__PORT}
      - NOTIFIER__TYPE=${NOTIFIER__TYPE}
      - NOTIFIER__SMTP__HOST=${NOTIFIER__SMTP__HOST}
      - NOTIFIER__SMTP__PORT=${NOTIFIER__SMTP__PORT}
      - NOTIFIER__SMTP__USERNAME=${NOTIFIER__SMTP__USERNAME}
      - NOTIFIER__SMTP__PASSWORD=${NOTIFIER__SMTP__PASSWORD}
      - NOTIFIER__SMTP__SENDER=${NOTIFIER__SMTP__SENDER}
      - NOTIFIER__SMTP__TLS_MODE=${NOTIFIER__SMTP__TLS_MODE}
      - NOTIFIER__SMTP__SKIP_VERIFY_TLS=${NOTIFIER__SMTP__SKIP_VERIFY_TLS}
      - ACTIVITY__TYPE=${ACTIVITY__TYPE}
      - ACTIVITY__LOKI__ENDPOINT=${ACTIVITY__LOKI__ENDPOINT}
      - AUTH__PROVIDERS__KEYS=${AUTH__PROVIDERS__KEYS}
      - AUTH__PROVIDERS__LOCAL__NAME=${AUTH__PROVIDERS__LOCAL__NAME}
      - AUTH__PROVIDERS__LOCAL__TYPE=${AUTH__PROVIDERS__LOCAL__TYPE}
      - AUTH__PROVIDERS__LOCAL__SHARING__ALLOWED=${AUTH__PROVIDERS__LOCAL__SHARING__ALLOWED}

    ports:
      - "8080:8080"
    restart: on-failure:3
    depends_on:
      bucket-init:
        condition: service_completed_successfully
      database:
        condition: service_healthy

  bucket:
    container_name: bucket
    image: rustfs/rustfs:1.0.0-alpha.84
    environment:
      - RUSTFS_ACCESS_KEY=${STORAGE__RUSTFS__ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${STORAGE__RUSTFS__SECRET_KEY}
      - RUSTFS_NOTIFY_MQTT_ENABLE_PRIMARY=true
      - RUSTFS_NOTIFY_MQTT_BROKER_PRIMARY=mqtt://nats:1883
      - RUSTFS_NOTIFY_MQTT_TOPIC_PRIMARY=${EVENTS__QUEUES__BUCKET_EVENTS__NAME}
      - RUSTFS_NOTIFY_MQTT_QOS_PRIMARY=2
      - RUSTFS_NOTIFY_MQTT_QUEUE_DIR_PRIMARY=/data/.rustfs/events
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - "rustfs_data:/data"
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health" ]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 2s
    restart: unless-stopped
    depends_on:
      - nats

  bucket-init:
    container_name: bucket-init
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=${STORAGE__RUSTFS__ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${STORAGE__RUSTFS__SECRET_KEY}
      - AWS_RETRY_MODE=standard
      - AWS_MAX_ATTEMPTS=5
      - AWS_REGION=us-east-1
      - BUCKET_NAME=${STORAGE__RUSTFS__BUCKET_NAME}
      - ENDPOINT_URL=http://bucket:9000
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "Configuring RustFS buckets via aws-cli..."

        # Wait for RustFS to be ready
        echo "Waiting for RustFS to be ready..."
        for bucket in $${BUCKET_NAME} loki-data loki-ruler; do
          while ! aws s3api head-bucket --bucket $${bucket} --endpoint-url $${ENDPOINT_URL} 2>/dev/null; do
            echo "Checking if bucket $${bucket} exists... if not creating it."
            aws s3api create-bucket --bucket $${bucket} --endpoint-url $${ENDPOINT_URL} 2>/dev/null || true
            sleep 2
          done
          echo "Bucket $${bucket} is ready."
        done

        echo "Applying CORS policy..."
        aws s3api put-bucket-cors --bucket $${BUCKET_NAME} --endpoint-url $${ENDPOINT_URL} --cors-configuration '{"CORSRules":[{"AllowedHeaders":["*"],"AllowedMethods":["GET","PUT","POST","DELETE","HEAD"],"AllowedOrigins":["*"],"ExposeHeaders":["ETag"]}]}'

        echo "Adding bucket notification events for MQTT target..."
        aws s3api put-bucket-notification-configuration --bucket $${BUCKET_NAME} --endpoint-url $${ENDPOINT_URL} --notification-configuration '{"QueueConfigurations":[{"QueueArn":"arn:rustfs:sqs:us-east-1:primary:mqtt","Events":["s3:ObjectCreated:*","s3:ObjectRemoved:*","s3:ObjectAccessed:*"]}]}'

        echo "Buckets configured successfully."
    depends_on:
      bucket:
        condition: service_healthy
      nats:
        condition: service_started
    restart: "no"

  database:
    container_name: database
    image: postgres:18
    ports:
      - "5432:5432"
    volumes:
      - "postgresql_data:/var/lib/postgresql"
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DATABASE__POSTGRES__USER}
      POSTGRES_PASSWORD: ${DATABASE__POSTGRES__PASSWORD}
      POSTGRES_DB: ${DATABASE__POSTGRES__NAME}
    healthcheck:
      test: [ "CMD-SHELL", "psql -U ${DATABASE__POSTGRES__USER} -d ${DATABASE__POSTGRES__NAME} -c 'SELECT 1' || exit 1" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  valkey:
    container_name: valkey
    image: valkey/valkey:9
    command: [ "valkey-server", "--requirepass", "${CACHE__VALKEY__PASSWORD}" ]
    ports:
      - "6379:6379"
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - "valkey_data:/data"

  mailpit:
    image: axllent/mailpit:v1.29
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - "mail_data:/data"
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db

  nats:
    image: nats:2.12-alpine
    container_name: nats
    ports:
      - "4222:4222" # NATS protocol
      - "1883:1883" # MQTT protocol
      - "8222:8222" # HTTP monitoring
    restart: unless-stopped
    command: [ "-c", "/etc/nats/nats.conf" ]
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - "nats_data:/data"
      - ./config/nats.conf:/etc/nats/nats.conf:ro

  loki:
    container_name: loki
    image: grafana/loki:3.6.7
    command: "-config.file=/etc/loki/config.yaml"
    ports:
      - "3100:3100"
      - "7946:7946"
      - "9095:9095"
    volumes:
      - ./config/loki.yaml:/etc/loki/config.yaml
    depends_on:
      bucket:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "loki", "-health" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgresql_data:
  rustfs_data:
  mail_data:
  valkey_data:
  nats_data:
