name: safebucket

services:
  bucket:
    container_name: bucket
    image: rustfs/rustfs:1.0.0-alpha.84
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_NOTIFY_MQTT_ENABLE_PRIMARY=${RUSTFS_NOTIFY_MQTT_ENABLE_PRIMARY}
      - RUSTFS_NOTIFY_MQTT_BROKER_PRIMARY=${RUSTFS_NOTIFY_MQTT_BROKER_PRIMARY}
      - RUSTFS_NOTIFY_MQTT_TOPIC_PRIMARY=${RUSTFS_NOTIFY_MQTT_TOPIC_PRIMARY}
      - RUSTFS_NOTIFY_MQTT_QOS_PRIMARY=${RUSTFS_NOTIFY_MQTT_QOS_PRIMARY}
      - RUSTFS_NOTIFY_MQTT_QUEUE_DIR_PRIMARY=${RUSTFS_NOTIFY_MQTT_QUEUE_DIR_PRIMARY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - "rustfs_data:/data"
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health" ]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 2s
    restart: unless-stopped
    depends_on:
      - nats

  bucket-init:
    container_name: bucket-init
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=${RUSTFS_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${RUSTFS_SECRET_KEY}
      - AWS_RETRY_MODE=standard
      - AWS_MAX_ATTEMPTS=5
      - AWS_REGION=us-east-1
      - ENDPOINT_URL=http://bucket:9000
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "Configuring RustFS buckets via aws-cli..."

        # Wait for RustFS to be ready
        echo "Waiting for RustFS to be ready..."
        for bucket in safebucket loki-data loki-ruler; do
          while ! aws s3api head-bucket --bucket $${bucket} --endpoint-url $${ENDPOINT_URL} 2>/dev/null; do
            echo "Checking if bucket $${bucket} exists... if not creating it."
            aws s3api create-bucket --bucket $${bucket} --endpoint-url $${ENDPOINT_URL} 2>/dev/null || true
            sleep 2
          done
          echo "Bucket $${bucket} is ready."
        done

        echo "Applying CORS policy..."
        aws s3api put-bucket-cors --bucket safebucket --endpoint-url $${ENDPOINT_URL} --cors-configuration '{"CORSRules":[{"AllowedHeaders":["*"],"AllowedMethods":["GET","PUT","POST","DELETE","HEAD"],"AllowedOrigins":["*"],"ExposeHeaders":["ETag"]}]}'

        echo "Adding bucket notification events for MQTT target..."
        aws s3api put-bucket-notification-configuration --bucket safebucket --endpoint-url $${ENDPOINT_URL} --notification-configuration '{"QueueConfigurations":[{"QueueArn":"arn:rustfs:sqs:us-east-1:primary:mqtt","Events":["s3:ObjectCreated:*","s3:ObjectRemoved:*","s3:ObjectAccessed:*"]}]}'

        echo "Buckets configured successfully."
    depends_on:
      bucket:
        condition: service_healthy
      nats:
        condition: service_started
    restart: "no"

  database:
    container_name: database
    image: postgres:18
    ports:
      - "5432:5432"
    volumes:
      - "postgresql_data:/var/lib/postgresql"
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' || exit 1" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  valkey:
    container_name: valkey
    image: valkey/valkey:9
    command: [ "valkey-server", "--requirepass", "${VALKEY_PASSWORD}" ]
    ports:
      - "6379:6379"
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - "valkey_data:/data"

  mailpit:
    image: axllent/mailpit:v1.29.3
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - "mail_data:/data"
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ALLOW_INSECURE: true
      MP_SMTP_AUTH: root:root

  nats:
    image: nats:2.12-alpine
    container_name: nats
    ports:
      - "4222:4222"   # NATS protocol
      - "1883:1883"   # MQTT protocol
      - "8222:8222"   # HTTP monitoring
    restart: unless-stopped
    command: [ "-c", "/etc/nats/nats.conf" ]
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - "nats_data:/data"
      - ./config/nats.conf:/etc/nats/nats.conf

  loki:
    container_name: loki
    profiles: [ loki ]
    image: grafana/loki:3.6.7
    command: "-config.file=/etc/loki/config.yaml"
    ports:
      - "3100:3100"
      - "7946:7946"
      - "9095:9095"
    volumes:
      - ./config/loki.yaml:/etc/loki/config.yaml
    depends_on:
      bucket:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "loki", "-health" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    container_name: grafana
    profiles: [ debug ]
    image: docker.io/grafana/grafana:latest
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki:3100
            jsonData:
              httpHeaderName1: "X-Scope-OrgID"
            secureJsonData:
              httpHeaderValue1: "tenant1"
        EOF
        /run.sh
    ports:
      - "3200:3000"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rustfs_data:
  postgresql_data:
  mail_data:
  valkey_data:
  nats_data:
